<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My PDF Image Website</title>
  <style>
        /* Website ka background color */
        body {
            background-color: #f0f0f0;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        /* Container jo images ko beech mein rakhega */
        .pdf-container {
            width: 100%;
            max-width: 800px; /* Ek standard page ki width */
            display: flex;
            flex-direction: column;
            gap: 20px; /* Images ke beech ka gap */
        }

        /* Har image ki styling */
        .pdf-container img {
            width: 100%;
            height: auto;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2); /* Shadow se 'Paper' wala look aayega */
            border-radius: 4px;
        }

        h1 {
            color: #333;
        }
    </style>
</head>
<body>

<h1>Meri PDF Website</h1>

<div class="pdf-container">
  <img src="aniImage1.jpg" alt="Page 1">
  <img src="https://via.placeholder.com/600x800?text=Page+2" alt="Page 2">
  <img src="https://via.placeholder.com/600x800?text=Page+3" alt="Page 3">
</div>

</body>
</html>
